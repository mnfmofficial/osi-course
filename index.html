   {s:'Query DNS records.',c:'dig google.com A
dig google.com MX
dig google.com TXT'},
   {s:'Reverse DNS lookup.',c:'dig -x 8.8.8.8'},
   {s:'Attempt a DNS zone transfer.',c:'dig axfr @ns1.target.com target.com
# Replace with the target's actual nameserver'},
   {s:'Directory brute force.',c:'gobuster dir \
  -u http://<target> \
  -w /usr/share/wordlists/dirbuster/directory-list-2.3-small.txt \
  -t 50',n:'Run only against your own lab, DVWA, or a CTF machine. Never against systems without permission.'}
 ],
 quiz:[
   {q:'SQL injection is possible when user input is embedded in a query without what?',
    o:['User authentication','Parameterisation and input sanitisation','HTTPS encryption','Rate limiting'],a:1,
    ex:'SQLi occurs because user input is concatenated directly into a SQL query and interpreted as SQL syntax. Parameterised queries fix this by separating query structure from data — user input is never executed as SQL.',
    oe:['Authentication confirms identity — it does not prevent SQLi if the query still concatenates input.','Correct. Parameterised queries ensure user data is never interpreted as SQL syntax.','HTTPS encrypts the connection — the SQLi payload still reaches and executes on the database.','Rate limiting slows brute-force attacks but does not prevent a single crafted payload.']},
   {q:'DNS operates on which port by default?',
    o:['443','80','22','53'],a:3,
    ex:'Port 53 is reserved for DNS — UDP for standard queries, TCP for zone transfers and large responses. An open port 53 on a non-DNS server is suspicious. Zone transfers on TCP 53 reveal all DNS records for a domain — a common CTF misconfiguration.',
    oe:['Port 443 is HTTPS.','Port 80 is HTTP.','Port 22 is SSH.','Correct. DNS uses port 53 — UDP for queries, TCP for zone transfers.']},
   {q:'What is the key difference between stored and reflected XSS?',
    o:['Stored XSS only affects the attacker's browser','Stored XSS persists in the database and executes for every visitor; reflected fires only for the person clicking the malicious link','Reflected XSS requires the victim to be authenticated','They are the same vulnerability with different names'],a:1,
    ex:'Reflected XSS: payload is in the URL, reflected in the response, affects only whoever clicks the crafted link. Stored XSS: payload is saved in the database and executes in every visitor's browser — potentially thousands of victims from one injection.',
    oe:['Stored XSS affects all visitors to the page — not just the attacker.','Correct. Stored XSS is persistent and affects all visitors. Reflected XSS requires tricking each victim individually.','Reflected XSS does not require authentication.','They are mechanically distinct: one persists in storage, one is reflected in the response.']},
   {q:'CSRF is effective because browsers automatically include what with requests to a target site?',
    o:['The victim's IP address in a header','Session cookies for that domain','A CORS preflight header','The browser's user-agent string'],a:1,
    ex:'Browsers automatically attach all cookies for a domain to every request — regardless of which site triggered it. A CSRF attack embeds a request to the target in a malicious page. The victim's browser sends it with the session cookie. CSRF tokens prevent this.',
    oe:['IP addresses are not automatically added to request headers by browsers.','Correct. Session cookies are automatically sent with every request to their domain.','CORS preflight is a browser mechanism for cross-origin security — not session authentication.','User-agent strings identify the browser — they do not authenticate the user.']},
   {q:'What does the robots.txt file contain and why is it useful in recon?',
    o:['Server software version information','A list of valid user accounts','Disallow rules that often reveal sensitive paths the admin does not want indexed','A list of installed application plugins'],a:2,
    ex:'robots.txt instructs crawlers which paths not to index. It is publicly readable at /robots.txt. Administrators often put sensitive paths there — /admin, /backup, /internal — paths not indexed but not actually restricted. robots.txt is a free map of interesting targets.',
    oe:['Server version information may appear in HTTP headers but not in robots.txt.','User account enumeration is done through other means.','Correct. Disallow entries frequently reveal admin panels, backup paths, and API endpoints.','Plugin lists are not in robots.txt.']},
   {q:'What does HTTP status code 403 mean?',
    o:['The resource was not found','The server encountered an internal error','The request requires authentication credentials','The server understood the request but refuses access — the resource exists'],a:3,
    ex:'401 = Unauthorised (no valid credentials). 403 = Forbidden (resource exists but access denied). In bug bounty, a 403 is more interesting than a 404: the resource exists and finding a bypass is a valid finding.',
    oe:['Resource not found is 404 — 403 means the resource exists but access is denied.','Internal server error is 500 — a different status class.','Requiring authentication is 401 — 403 means the server recognises you but still refuses.','Correct. 403 Forbidden means the resource exists but access is denied.']},
   {q:'What does the Content-Security-Policy (CSP) header do?',
    o:['Encrypts all resources sent to the browser','Forces the browser to always use HTTPS','Restricts which resources the browser may load, mitigating XSS and data injection','Prevents cross-origin requests from reading the response'],a:2,
    ex:'CSP tells the browser: only load scripts from these domains, block all inline JavaScript. It is a defence-in-depth measure against XSS — even if an attacker injects a script tag, the browser refuses to execute it if the source is not whitelisted. A missing or weak CSP is reportable in bug bounty.',
    oe:['Encrypting resources is TLS (Layer 6) — CSP is a resource loading policy.','Forcing HTTPS is HSTS (Strict-Transport-Security) — not CSP.','Correct. CSP restricts which resources the browser may load, directly mitigating XSS.','Cross-origin response access is controlled by CORS headers — not CSP.']},
   {q:'What do gobuster and ffuf primarily do in web security testing?',
    o:['Crack password hashes','Fuzz HTTP parameters for SQL injection','Enumerate directories and files on a web server using a wordlist','Perform DNS brute-forcing to find subdomains'],a:2,
    ex:'gobuster and ffuf send HTTP requests for each word in a wordlist appended to the target URL — /admin, /backup, /.git — looking for 200, 301, or 403 responses. Finding /admin returning 403 is more valuable than 404 — the resource is real.',
    oe:['Password hash cracking is hashcat or john.','SQL injection fuzzing is done with sqlmap or Burp Suite Intruder.','Correct. gobuster and ffuf brute-force web server paths to discover hidden directories and files.','DNS subdomain brute-forcing is a separate use case — gobuster has a DNS mode but it is not the primary function.']},
   {q:'What is an IDOR vulnerability?',
    o:['Injecting malicious code into a database query','Cross-site request forgery using a victim's session','Accessing another user's data by manipulating object references in requests','Directory traversal using ../ sequences'],a:2,
    ex:'IDOR (Insecure Direct Object Reference) occurs when an application uses user-controllable values to reference objects without verifying authorisation. Changing ?id=1001 to ?id=1002 and receiving another user's record is IDOR. Extremely common in bug bounties — simple to find, high impact.',
    oe:['Injecting malicious code into queries is SQL injection.','CSRF tricks a browser into making unintended requests — IDOR is about accessing unauthorised data directly.','Correct. IDOR is accessing other users' data by manipulating identifiers the server fails to validate.','Directory traversal uses ../ sequences to escape the web root — a different vulnerability.']}
 ]}
];

const FINAL_QUIZ=[
  {q:'Which Layer 1 device broadcasts every signal out of every port with no filtering?',layer:'L1',
   o:['Switch','Router','Hub','Bridge'],a:2,
   ex:'A hub is a pure Layer 1 device with no address awareness. It retransmits every signal received on every port. Switches (L2) read MAC addresses, routers (L3) read IP addresses, bridges (L2) connect segments intelligently.',
   oe:['Switches read MAC addresses and forward to the correct port only.','Routers read IP addresses and make Layer 3 forwarding decisions.','Correct. Hubs blindly retransmit every signal out every port with no filtering.','Bridges are Layer 2 devices that connect segments with MAC-level intelligence.']},
  {q:'Attenuation in networking describes?',layer:'L1',
   o:['Electromagnetic interference from nearby cables','The degradation of signal strength over distance','Collision of signals on a shared medium','Data loss due to packet corruption'],a:1,
   ex:'Attenuation is the loss of signal energy as it travels through a medium. Every cable has a maximum length (100m for Cat5e) beyond which the signal degrades too much. Repeaters combat attenuation by regenerating the signal.',
   oe:['EMI is interference from external sources — attenuation is specifically distance-based signal loss.','Correct. Attenuation is signal strength degradation over distance.','Signal collisions happen on shared media — not what attenuation describes.','Packet corruption is a data integrity issue — attenuation is a physical signal phenomenon.']},
  {q:'ARP resolves which type of mapping?',layer:'L2',
   o:['Domain name to IP','MAC address to IP','IP address to MAC address','Port number to service'],a:2,
   ex:'ARP maps a known IP address to an unknown MAC address. A host cannot build an Ethernet frame without knowing the destination MAC. It broadcasts "who has IP x.x.x.x?" and the owner replies with its MAC.',
   oe:['Domain-to-IP is DNS at Layer 7.','Reverse ARP (RARP) maps MAC to IP — ARP is the other direction.','Correct. ARP resolves an IP address to a MAC address.','Port-to-service mapping is a Layer 4/7 concept.']},
  {q:'MAC flooding exhausts which switch resource?',layer:'L2',
   o:['The routing table','The CAM table','The ARP cache','The STP root bridge table'],a:1,
   ex:'A switch's CAM table maps MAC addresses to physical ports. MAC flooding fills this table with fake MAC addresses, leaving no room for legitimate entries. The switch fails open and broadcasts all frames everywhere like a hub.',
   oe:['The routing table is a Layer 3 router construct.','Correct. The CAM table is the switch's MAC-to-port database — flooding it causes hub-like behaviour.','The ARP cache is maintained per-host, not by the switch.','STP tables track root bridge election — not the target of MAC flooding.']},
  {q:'ICMP type 8 represents which message?',layer:'L3',
   o:['Destination Unreachable','Time Exceeded','Echo Reply','Echo Request'],a:3,
   ex:'ICMP type numbers: 8 = Echo Request (ping sends this), 0 = Echo Reply, 3 = Destination Unreachable, 11 = Time Exceeded (sent by routers when TTL expires, used by traceroute).',
   oe:['Destination Unreachable is ICMP Type 3.','Time Exceeded is ICMP Type 11 — used by traceroute.','Echo Reply is ICMP Type 0 — the response sent back.','Correct. Type 8 is Echo Request — what the ping command sends out.']},
  {q:'A subnet mask determines?',layer:'L3',
   o:['Which traffic to encrypt between segments','How IP addresses are automatically assigned','Which bits of an IP address identify the network vs the host','The maximum number of routers on a network'],a:2,
   ex:'A subnet mask (e.g. 255.255.255.0 or /24) is ANDed with an IP address to determine which bits are the network portion and which are the host portion. Subnetting divides large address spaces into smaller segments.',
   oe:['Traffic encryption is TLS (Layer 6) — subnet masks are Layer 3 addressing tools.','Automatic IP assignment is DHCP.','Correct. A subnet mask separates the network bits from the host bits in an IP address.','Router limits are not defined by subnet masks.']},
  {q:'The TCP three-way handshake sequence is?',layer:'L4',
   o:['SYN → ACK → SYN-ACK','ACK → SYN → FIN','SYN → SYN-ACK → ACK','FIN → FIN-ACK → ACK'],a:2,
   ex:'(1) Client sends SYN. (2) Server responds SYN-ACK. (3) Client sends ACK. Only after all three does data flow. Understanding this is essential for port scanning and SYN flood attacks.',
   oe:['SYN then ACK then SYN-ACK is out of order.','ACK then SYN makes no sense — you cannot acknowledge before requesting.','Correct. SYN → SYN-ACK → ACK establishes a reliable TCP connection.','FIN sequence describes connection teardown, not establishment.']},
  {q:'A SYN flood attack exhausts which server resource?',layer:'L4',
   o:['CPU processing cycles','Hard disk space','The TCP connection state table','The DNS resolver cache'],a:2,
   ex:'Each SYN causes the server to allocate a Transmission Control Block in memory for the half-open connection. The SYN flood fills this finite table. SYN cookies solve this by deferring state allocation until the handshake completes.',
   oe:['SYN flood targets connection state memory, not CPU cycles.','Disk space is irrelevant to TCP connection handling.','Correct. The TCP connection state table is the finite resource that SYN flood exhausts.','DNS cache is unrelated to TCP connection state.']},
  {q:'What does the HttpOnly cookie flag prevent?',layer:'L5',
   o:['Sending the cookie over HTTP (requires HTTPS)','JavaScript from reading or modifying the cookie','The cookie from being sent to third-party domains','The cookie from persisting after the browser closes'],a:1,
   ex:'HttpOnly tells the browser: this cookie must not be accessible via JavaScript. document.cookie returns nothing for HttpOnly cookies. This directly prevents the most common XSS payload — stealing session tokens via document.cookie.',
   oe:['Requiring HTTPS for the cookie is the Secure flag, not HttpOnly.','Correct. HttpOnly blocks JavaScript access to the cookie, mitigating session theft via XSS.','Cross-site sending is controlled by the SameSite attribute.','Session-only lifetime is controlled by omitting an expiry date from Set-Cookie.']},
  {q:'Session fixation differs from session hijacking because?',layer:'L5',
   o:['Fixation targets Layer 3; hijacking targets Layer 7','Fixation plants a known session ID before authentication; hijacking steals one post-authentication','Fixation requires network access; hijacking requires physical access','They are identical attacks described differently'],a:1,
   ex:'Session hijacking steals an existing authenticated token — attack after login. Session fixation plants a known token before login — the attacker holds the ID and waits for the victim to authenticate.',
   oe:['Both attacks operate at the HTTP session layer — not Layer 3.','Correct. Fixation is pre-authentication; hijacking is post-authentication.','Neither attack requires physical access.','They are distinct attacks with different timing and mechanisms.']},
  {q:'SSL stripping works by?',layer:'L6',
   o:['Breaking the TLS handshake mid-session','Intercepting HTTP before redirect to HTTPS, maintaining plaintext to the victim','Replacing TLS 1.3 with TLS 1.0','Removing the server's certificate from responses'],a:1,
   ex:'SSL stripping intercepts the initial HTTP request before it can redirect to HTTPS. The attacker maintains unencrypted HTTP with the victim while proxying HTTPS to the server. HSTS prevents this by instructing browsers to refuse HTTP.',
   oe:['Breaking a TLS handshake mid-session describes a different attack class.','Correct. SSL stripping prevents the HTTPS redirect — the victim communicates in plaintext.','Downgrading TLS versions is POODLE/BEAST — SSL stripping removes encryption entirely.','Certificate removal is not what SSL stripping does.']},
  {q:'Base64 encoding provides which security guarantee?',layer:'L6',
   o:['Confidentiality — only recipients with the key can decode','Data integrity — detects if content was modified','Authentication — proves who encoded the data','None — it is a representation change with no security property'],a:3,
   ex:'Base64 is purely a text encoding scheme converting binary to printable ASCII. Anyone can decode it with standard library functions and no key. It provides zero confidentiality, zero integrity, and zero authentication.',
   oe:['Base64 provides zero confidentiality — no key is needed to decode it.','Base64 provides no integrity check.','Base64 provides no authentication.','Correct. Base64 is a representation change only. No security property whatsoever.']},
  {q:'SQL injection is prevented primarily by?',layer:'L7',
   o:['User authentication before database access','Parameterised queries and input sanitisation','HTTPS encryption on the database connection','Rate limiting on login endpoints'],a:1,
   ex:'SQLi occurs because user input is concatenated into SQL query strings. Parameterised queries fix this by separating query structure from data — user input is never executed as SQL syntax.',
   oe:['Authentication confirms identity — if the query still concatenates input, SQLi is still possible.','Correct. Parameterised queries ensure user data is never interpreted as SQL syntax.','HTTPS encrypts the connection — the SQLi payload still executes on the database.','Rate limiting slows brute-force attacks but does not prevent a single crafted payload.']},
  {q:'DNS operates on which port?',layer:'L7',
   o:['443','80','22','53'],a:3,
   ex:'Port 53 is reserved for DNS — UDP for standard queries, TCP for zone transfers and large responses. An open port 53 on a non-DNS server is suspicious.',
   oe:['Port 443 is HTTPS.','Port 80 is HTTP.','Port 22 is SSH.','Correct. DNS uses port 53 — UDP for queries, TCP for zone transfers.']},
  {q:'An IDOR vulnerability allows an attacker to?',layer:'L7',
   o:['Inject SQL into a database query','Execute JavaScript in another user's browser','Access another user's data by manipulating object references','Bypass HTTPS by stripping TLS'],a:2,
   ex:'IDOR (Insecure Direct Object Reference) occurs when an application uses user-controllable values to reference objects without verifying authorisation. Changing ?id=1001 to ?id=1002 and receiving another user's record is IDOR. Very common in bug bounties.',
   oe:['Injecting SQL into queries is SQL injection.','Executing JavaScript in another's browser is XSS.','Correct. IDOR is accessing unauthorised data by manipulating identifiers the server fails to validate.','Bypassing HTTPS is SSL stripping — a Layer 6 attack.']},
  {q:'What does promiscuous mode on a NIC allow?',layer:'L2',
   o:['Encrypts all outgoing traffic automatically','Captures all frames on the segment regardless of destination MAC','Prevents other hosts from seeing the NIC's traffic','Filters traffic by IP address before Layer 3 processing'],a:1,
   ex:'By default a NIC discards frames not addressed to it. In promiscuous mode it captures every frame it physically receives regardless of destination MAC. Wireshark enables promiscuous mode automatically.',
   oe:['Encryption is Layer 6 — NICs do not encrypt traffic automatically.','Correct. Promiscuous mode disables MAC filtering, allowing capture of all frames on the segment.','Hiding your traffic requires encryption, not promiscuous mode.','IP-level filtering is Layer 3 performed by the OS, not a NIC mode.']},
  {q:'traceroute reveals information by exploiting which IP field?',layer:'L3',
   o:['Checksum','Fragment offset','Source IP','TTL'],a:3,
   ex:'traceroute sends packets with incrementally increasing TTL values. Each router decrements TTL by 1; when it reaches 0, the router drops the packet and sends an ICMP Time Exceeded message back revealing its IP address.',
   oe:['Checksum is for error detection — traceroute does not exploit it.','Fragment offset is used in packet reassembly — not related to traceroute.','Source IP is used in spoofing attacks — traceroute uses legitimate source IPs to receive replies.','Correct. traceroute exploits the TTL field, mapping each hop by triggering ICMP Time Exceeded responses.']},
  {q:'The SameSite=Strict cookie attribute prevents?',layer:'L5',
   o:['JavaScript from reading the cookie','The cookie from being sent over HTTP','The cookie from being sent with cross-site requests','The cookie from being stored after the browser closes'],a:2,
   ex:'SameSite=Strict: only send this cookie when the request originates from the same domain. Cross-site requests will not include it. This directly mitigates CSRF — the forged request from the attacker's domain will not carry the session cookie.',
   oe:['Blocking JavaScript from reading the cookie is the HttpOnly flag.','Restricting to HTTPS is the Secure flag.','Correct. SameSite=Strict prevents the cookie from being sent with any cross-site request, mitigating CSRF.','Cookie persistence is controlled by the expiry date in Set-Cookie.']},
  {q:'Which nmap flag detects service names and versions on open ports?',layer:'L4',
   o:['-sS','-sN','-sV','-O'],a:2,
   ex:'nmap -sV (version detection) probes open ports and identifies the exact service and version. Instead of just knowing port 80 is open, you learn it is Apache 2.4.51. This feeds directly into CVE searches. -sS is SYN scan, -sN is null scan, -O is OS fingerprinting.',
   oe:['-sS is a SYN stealth scan — it detects port state, not service versions.','-sN is a null scan — it sends packets with no flags to infer port state.','Correct. -sV performs service and version detection on open ports.','-O performs OS fingerprinting based on TCP/IP stack characteristics.']},
  {q:'CSRF is effective because browsers automatically do what?',layer:'L7',
   o:['Add the victim's IP to every request header','Send cookies for a domain with every request to that domain','Perform CORS preflight checks on all requests','Embed the referrer URL in every HTTP request'],a:1,
   ex:'Browsers automatically attach all cookies for a domain to every request regardless of which site triggered it. A CSRF attack embeds a request to the target in a malicious page. The victim's browser sends it with the session cookie. CSRF tokens break this by requiring an unpredictable form value.',
   oe:['IP addresses are not automatically added to request headers by browsers.','Correct. Session cookies are automatically sent with every request to their domain.','CORS preflight is for cross-origin resource access, not session authentication.','Referrer headers are not always included and are easily spoofed.']}
];

function ds(){const r={c:{},sc:{},ll:null,fc:false,fsc:null};LAYERS.forEach(l=>{r.c[l.id]=false;r.sc[l.id]=null;});return r;}
let S=(()=>{try{const s=localStorage.getItem('osi_v4');return s?JSON.parse(s):ds();}catch{return ds();}})();
function save(){localStorage.setItem('osi_v4',JSON.stringify(S));}

let curL=null,curT='overview';

function buildNav(){
  const nav=document.getElementById('layer-nav');
  nav.innerHTML='';
  const hb=document.createElement('button');
  hb.className='lbtn'+(curL===null?' active':'');
  hb.innerHTML='<span class="ln">&nbsp;</span><span class="lname">Overview</span>';
  hb.onclick=()=>showHome();
  nav.appendChild(hb);
  LAYERS.forEach(l=>{
    const b=document.createElement('button');
    b.className='lbtn'+(S.c[l.id]?' done':'')+(curL===l.id?' active':'');
    b.innerHTML=`<span class="ln">L${l.id}</span><span class="lname">${l.name}</span>`;
    b.onclick=()=>showLayer(l.id);
    nav.appendChild(b);
  });
  const fb=document.createElement('button');
  fb.className='lbtn final-btn'+(S.fc?' done':'')+(curL==='final'?' active':'');
  fb.innerHTML='<span class="ln">★</span><span class="lname">Final</span>';
  fb.onclick=()=>showFinal();
  nav.appendChild(fb);
  document.getElementById('tp-done').textContent=LAYERS.filter(l=>S.c[l.id]).length;
}

function showHome(){
  curL=null;curT='overview';buildNav();
  const done=LAYERS.filter(l=>S.c[l.id]).length;
  const pct=Math.round(done/LAYERS.length*100);
  document.getElementById('main-content').innerHTML=`
    <div class="home-hdr">
      <h1>OSI Model</h1>
      <p>Seven layers. Each covers theory, analogy, attack surface, and terminal exercises. Nine quiz questions per layer with per-answer explanations. Complete all seven, then take the combined final exam.</p>
      <div class="prow"><div class="bar-o"><div class="bar-i" style="width:${pct}%"></div></div><div class="blabel"><span>${done}</span>/7 layers done</div></div>
    </div>
    <div class="hgrid">
      ${LAYERS.map(l=>`
        <div class="hcard${S.c[l.id]?' done':''}" onclick="showLayer(${l.id})">
          <div class="hcnum">${l.id}</div>
          <div class="hcbody"><h3>${l.name}</h3><p>${l.protocols}</p></div>
          <div class="hcstat">${S.c[l.id]?'done ✓':'→'}</div>
        </div>`).join('')}
      <div class="hcard final${S.fc?' done':''}" onclick="showFinal()">
        <div class="hcnum">★</div>
        <div class="hcbody"><h3>Final Exam</h3><p>${FINAL_QUIZ.length} questions · all layers combined</p></div>
        <div class="hcstat">${S.fc?'done ✓':'→'}</div>
      </div>
    </div>`;
}

function showLayer(id,tab){
  curL=parseInt(id);curT=tab||'overview';S.ll=curL;save();buildNav();renderLayer();
}

function renderLayer(){
  const l=LAYERS.find(x=>x.id===curL);if(!l)return;
  const idx=LAYERS.indexOf(l),prev=LAYERS[idx-1]||null,next=LAYERS[idx+1]||null;
  const tabs=['overview','security','practical','quiz'];
  const tl={overview:'Overview',security:'Security',practical:'Practical',quiz:`Quiz (${l.quiz.length})`};
  document.getElementById('main-content').innerHTML=`
    <div class="layer-hdr">
      <div class="lnum">${l.id}</div>
      <div class="ltitle"><h2>${l.name}</h2><div class="lsub">${l.protocols}</div></div>
    </div>
    <div class="tab-strip">${tabs.map(t=>`<button class="tbtn${curT===t?' active':''}" onclick="switchTab('${t}')">${tl[t]}</button>`).join('')}</div>
    <div id="tc"></div>
    <div class="navfoot">
      <button class="btn" onclick="${prev?`showLayer(${prev.id})`:'showHome()'}" style="min-width:76px">← ${prev?prev.name:'Overview'}</button>
      ${next?`<button class="btn btn-amber" onclick="showLayer(${next.id})" style="min-width:76px">${next.name} →</button>`:`<button class="btn btn-amber" onclick="showFinal()" style="min-width:76px">Final Exam →</button>`}
    </div>`;
  renderTab(l);
}

function switchTab(t){
  curT=t;
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase().startsWith(t)));
  renderTab(LAYERS.find(x=>x.id===curL));
}

function renderTab(l){
  const el=document.getElementById('tc');if(!el)return;
  if(curT==='overview') el.innerHTML=`
    <div class="prose-blk"><span class="slabel">Theory</span><div class="prose">${l.ov.map(p=>`<p>${p}</p>`).join('')}</div></div>
    <div class="analogy-box"><span class="slabel">Analogy</span><div class="prose"><p>${l.analogy}</p></div></div>`;
  else if(curT==='security') el.innerHTML=`
    <span class="slabel">Attack surface — Layer ${l.id}</span>
    ${l.attacks.map(a=>`<div class="acard"><div class="acard-name">${a.n}</div><div class="acard-desc">${a.d}</div><div class="acard-tool">tools: <span>${a.t}</span></div></div>`).join('')}`;
  else if(curT==='practical') el.innerHTML=`
    <span class="slabel">Terminal exercises — Layer ${l.id}</span>
    ${l.practical.map((p,i)=>`<div class="step"><div class="step-n">Step ${i+1}</div><div class="step-d">${p.s}</div>${p.c?`<div class="cmd">${p.c}</div>`:''} ${p.n?`<div class="note"><strong>Note</strong> — ${p.n}</div>`:''}</div>`).join('')}
    <div class="note"><strong>Environment</strong> — Run on Kali Linux or any Debian-based system. Use your own lab or a CTF target only. Never test systems without explicit permission.</div>`;
  else if(curT==='quiz') renderQuizSection(l.quiz,l.id,false);
}

let qa={},qs=false,quizCtx=null;

function renderQuizSection(questions,ctx,isFinal){
  qa={};qs=false;quizCtx={questions,ctx,isFinal};
  const sc=isFinal?S.fsc:S.sc[ctx];
  const total=questions.length;
  const intro=isFinal
    ?`${total} questions drawn from all seven layers. Each question is labelled with its layer. Per-answer explanations are revealed on submit.`
    :`Layer ${ctx} — ${total} questions. Wrong answers show explanations on submit.`;
  document.getElementById('tc').innerHTML=`
    <div class="qintro">${intro}</div>
    ${questions.map((q,qi)=>`
      <div class="qblk" id="qb-${qi}">
        ${isFinal&&q.layer?`<div class="layer-tag">${q.layer}</div>`:''}
        <div class="qtxt"><span class="qnum">Q${qi+1} of ${total}</span>${q.q}</div>
        <div class="opts">
          ${q.o.map((o,oi)=>`
            <div class="opt" id="o-${qi}-${oi}" onclick="selOpt(${qi},${oi})">
              <span class="opt-lt">${['a','b','c','d'][oi]}</span>
              <div><span>${o}</span><div class="opt-explain" id="oe-${qi}-${oi}">${q.oe[oi]}</div></div>
            </div>`).join('')}
        </div>
        <div class="q-explain" id="qex-${qi}"><strong>Explanation</strong>${q.ex}</div>
      </div>`).join('')}
    <div class="qfoot">
      <div class="sdisplay" id="sdis">${sc!==null?`last score: <span>${sc}/${total}</span>`:'&nbsp;'}</div>
      <button class="btn btn-amber" id="sbtn" onclick="submitQuiz()">Submit answers</button>
    </div>
    <div class="cbanner${sc!==null?' show '+getBannerClass(sc,total):''}" id="cbanner">${sc!==null?getBannerText(ctx,sc,total,isFinal):''}</div>`;
}

function selOpt(qi,oi){
  if(qs)return;
  qa[qi]=oi;
  quizCtx.questions.forEach((_,i)=>[0,1,2,3].forEach(j=>{
    const el=document.getElementById(`o-${i}-${j}`);
    if(el)el.classList.toggle('selected',i===qi&&j===oi);
  }));
}

function submitQuiz(){
  const{questions,ctx,isFinal}=quizCtx;
  if(questions.some((_,i)=>qa[i]===undefined)){alert('Answer all '+questions.length+' questions before submitting.');return;}
  qs=true;let sc=0;
  questions.forEach((q,qi)=>{
    const ch=qa[qi],cor=q.a;
    [0,1,2,3].forEach(oi=>{
      const el=document.getElementById(`o-${qi}-${oi}`);
      const oe=document.getElementById(`oe-${qi}-${oi}`);
      if(!el)return;
      el.classList.remove('selected');
      if(oi===cor){el.classList.add('correct');if(oe)oe.classList.add('show');}
      else if(oi===ch&&ch!==cor){el.classList.add('wrong');if(oe)oe.classList.add('show');}
    });
    const exEl=document.getElementById(`qex-${qi}`);
    if(exEl)exEl.classList.add('show');
    if(ch===cor)sc++;
  });
  if(isFinal){S.fsc=sc;S.fc=true;}
  else{S.sc[ctx]=sc;S.c[ctx]=true;}
  save();
  document.getElementById('sdis').innerHTML=`score: <span>${sc}/${questions.length}</span>`;
  document.getElementById('sbtn').disabled=true;
  const cb=document.getElementById('cbanner');
  if(cb){cb.innerHTML=getBannerText(ctx,sc,questions.length,isFinal);cb.className='cbanner show '+getBannerClass(sc,questions.length);}
  buildNav();
}

function getBannerClass(sc,total){
  const p=sc/total;return p===1?'good':p>=0.66?'mid':'low';
}
function getBannerText(ctx,sc,total,isFinal){
  const p=sc/total;
  const label=isFinal?'Final exam':'Layer '+ctx;
  const msg=p===1?'All correct.':p>=0.77?'Good. Review the explanations above for the ones you missed.':p>=0.55?'Review the explanations and retry.':'Go back through the theory and security tabs before retrying.';
  return `${label} — ${sc}/${total}. ${msg}`;
}

function showFinal(){
  curL='final';buildNav();
  document.getElementById('main-content').innerHTML=`
    <div class="final-hdr">
      <h2>Combined Final Exam</h2>
      <p>${FINAL_QUIZ.length} questions drawn from all seven layers. Each question shows its layer. Per-answer explanations are revealed on submit. No time limit.</p>
    </div>
    <div id="tc"></div>`;
  renderQuizSection(FINAL_QUIZ,'final',true);
}

buildNav();showHome();
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
